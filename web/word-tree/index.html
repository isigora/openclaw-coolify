<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>词语大树 Treemap</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>词语大树 Treemap</h1>
      <p>输入词语，树图会闪亮定位；点击节点可看周边语义环境。</p>
      <div class="search-row">
        <input id="wordInput" type="text" placeholder="输入词语（如：妈妈 / 看）" />
        <button id="searchBtn">搜索</button>
      </div>
    </header>

    <main>
      <section class="panel map-panel">
        <h2>Treemap</h2>
        <svg id="treemap" width="1000" height="560"></svg>
      </section>
      <section class="panel detail-panel">
        <h2>词语环境</h2>
        <div id="detail">请选择或搜索一个词语。</div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="app.js"></script>
  </body>
</html>
